# Copy this file to union_v0_models.local.yaml and edit endpoints/model names.
# Do not commit API keys.

defaults:
  api_type: chat_completions
  temperature: 0
  max_tokens: 1800
  timeout_seconds: 120
  max_retries: 3
  retry_sleep_seconds: 5

models:
  medgemma:
    provider: openai_compatible
    model: medgemma
    base_url: http://127.0.0.1:8000/v1
    api_key_env: VLLM_API_KEY

  qwen235b:
    provider: openai_compatible
    model: qwen235b
    base_url: http://127.0.0.1