name: meaning-preservation
channels:
  - conda-forge
  - pytorch
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.10
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - joblib>=1.3
  - tqdm>=4.66
  - tabulate>=0.9
  - pip:
      # Optional structured classifier. If unavailable, the runner skips structured_xgb.
      - xgboost>=2.0
      # Optional semantic features. Required only for --embedding_model/--nli_model.
      # If sentence-transformers import fails on HPC, use --embedding_backend hf.
      - torch>=2.1
      - transformers>=4.40
      - sentence-transformers>=2.6
